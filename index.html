<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f6f4ff 0%, #edf5ff 50%, #eefcf8 100%);
      color: #172033;
    }

    .container {
      width: min(680px, 100%);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 14px 40px rgba(49, 74, 144, 0.18);
      animation: card-rise 700ms ease-out;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 22px;
      font-size: clamp(1.7rem, 3vw, 2.3rem);
      color: #293462;
      letter-spacing: 0.2px;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    li {
      padding: 14px 16px;
      border-radius: 12px;
      background: linear-gradient(90deg, #ffffff 0%, #f7f9ff 100%);
      border: 1px solid #e2e8ff;
      box-shadow: 0 3px 10px rgba(60, 88, 173, 0.08);
      transform: translateY(8px);
      opacity: 0;
      animation: item-fade 650ms ease forwards;
    }

    li:nth-child(2) {
      animation-delay: 120ms;
    }

    li:nth-child(3) {
      animation-delay: 240ms;
    }

    li::before {
      content: "✨";
      margin-right: 10px;
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes item-fade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>2 сторис</li>
      <li>план постов на неделю</li>
    </ul>
  </main>
</body>
</html>
